events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Round-robin for API requests
    upstream backend_api {
        least_conn;
        server backend:3000;
        keepalive 32;
    }

    # Sticky sessions for WebSocket (ip_hash ensures same client → same backend)
    upstream backend_ws {
        ip_hash;
        server backend:3000;
    }

    upstream frontend_srv {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 10m;

        # React SPA
        location / {
            proxy_pass http://frontend_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # REST API — round-robin across backend instances
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # WebSocket — sticky by client IP
        location /ws {
            proxy_pass http://backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
